<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geshtenja Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/admin.css" />
  </head>
  <body>
    <div id="app">
      <!-- Login -->
      <section class="admin-panel" id="loginPanel">
        <div class="admin-card admin-card--narrow">
          <h1>Geshtenja Admin</h1>
          <p class="admin-muted">Sign in to manage products and portfolio works.</p>
          <form id="loginForm" class="admin-form">
            <label>
              <span>Email</span>
              <input type="email" name="email" required autocomplete="username" />
            </label>
            <label>
              <span>Password</span>
              <input type="password" name="password" required autocomplete="current-password" />
            </label>
            <p class="admin-error" id="loginError" hidden></p>
            <button type="submit" class="admin-btn admin-btn--primary">Sign in</button>
          </form>
        </div>
      </section>

      <!-- Dashboard -->
      <section class="admin-panel" id="dashboardPanel" hidden>
        <header class="admin-header">
          <div>
            <h1>Geshtenja Admin</h1>
            <p class="admin-muted" id="adminEmail"></p>
          </div>
          <div class="admin-header__actions">
            <a href="/" class="admin-btn admin-btn--ghost" target="_blank">View site</a>
            <button type="button" class="admin-btn admin-btn--ghost" id="logoutBtn">Sign out</button>
          </div>
        </header>

        <div class="admin-tabs" role="tablist">
          <button type="button" class="admin-tab is-active" data-tab="products" role="tab">Products</button>
          <button type="button" class="admin-tab" data-tab="works" role="tab">Portfolio</button>
        </div>

        <!-- Products -->
        <div class="admin-tab-panel is-active" id="tab-products">
          <div class="admin-grid">
            <div class="admin-card">
              <h2 id="productFormTitle">Add product</h2>
              <form id="productForm" class="admin-form">
                <input type="hidden" name="id" />
                <label>
                  <span>Name</span>
                  <input type="text" name="name" required placeholder="e.g. Aurora Pendant" />
                </label>
                <label>
                  <span>Category</span>
                  <select name="category" required>
                    <option value="pendant">Pendant</option>
                    <option value="sconce">Sconce</option>
                    <option value="chandelier">Chandelier</option>
                    <option value="floor">Floor lamp</option>
                    <option value="office">Office</option>
                  </select>
                </label>
                <label>
                  <span>Photo</span>
                  <input type="file" name="image" accept="image/*" />
                  <small class="admin-muted">Leave empty to keep current image when editing.</small>
                </label>
                <div class="admin-preview" id="productPreview" hidden>
                  <img alt="Preview" />
                </div>
                <p class="admin-error" id="productError" hidden></p>
                <div class="admin-form__actions">
                  <button type="submit" class="admin-btn admin-btn--primary">Save product</button>
                  <button type="button" class="admin-btn admin-btn--ghost" id="productCancel" hidden>Cancel</button>
                </div>
              </form>
            </div>
            <div class="admin-card">
              <h2>Your products</h2>
              <ul class="admin-list" id="productList"></ul>
            </div>
          </div>
        </div>

        <!-- Works -->
        <div class="admin-tab-panel" id="tab-works" hidden>
          <div class="admin-grid">
            <div class="admin-card">
              <h2 id="workFormTitle">Add portfolio work</h2>
              <form id="workForm" class="admin-form">
                <input type="hidden" name="id" />
                <label>
                  <span>Title</span>
                  <input type="text" name="title" required placeholder="e.g. Meridian Hotel Lobby" />
                </label>
                <label>
                  <span>Type</span>
                  <input type="text" name="type" required placeholder="e.g. Hospitality" />
                </label>
                <label>
                  <span>Location & year</span>
                  <input type="text" name="location" required placeholder="e.g. Prishtinë, 2025" />
                </label>
                <label>
                  <span>Photo</span>
                  <input type="file" name="image" accept="image/*" />
                </label>
                <label>
                  <span>Video (optional)</span>
                  <input type="file" name="video" accept="video/*" />
                </label>
                <div class="admin-preview" id="workPreview" hidden>
                  <img alt="Preview" />
                </div>
                <p class="admin-error" id="workError" hidden></p>
                <div class="admin-form__actions">
                  <button type="submit" class="admin-btn admin-btn--primary">Save work</button>
                  <button type="button" class="admin-btn admin-btn--ghost" id="workCancel" hidden>Cancel</button>
                </div>
              </form>
            </div>
            <div class="admin-card">
              <h2>Your portfolio</h2>
              <ul class="admin-list" id="workList"></ul>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/admin.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shop premium lighting at Geshtenja — pendants, sconces, chandeliers and more. Cash on delivery." />
    <title>Shop — Geshtenja</title>
    <link rel="icon" type="image/png" href="/chestnut.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/shop.css" />
  </head>
  <body class="shop-page">
    <div class="ambient-glow" aria-hidden="true"></div>
    <div id="siteHeader"></div>

    <main class="shop-main">
      <div class="shop-hero">
        <h1 class="shop-hero__title">Shop Lighting</h1>
        <p class="shop-hero__desc">Curated fixtures for every space. Order with cash on delivery across Kosovo.</p>
      </div>

      <div class="shop-toolbar">
        <label class="form-field shop-search">
          <span>Search</span>
          <input class="form-control" type="search" id="shopSearch" placeholder="Search products…" aria-label="Search products" />
        </label>
        <label class="form-field shop-select">
          <span>Sort by</span>
          <select class="form-control" id="shopSort" aria-label="Sort products">
            <option value="newest">Newest</option>
            <option value="featured">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </label>
      </div>

      <div class="shop-filters filter-bar" id="shopFilters" role="tablist" aria-label="Filter by category"></div>

      <div class="shop-grid" id="shopGrid"></div>
      <div class="shop-empty" id="shopEmpty" hidden>
        <p>No products match your search.</p>
      </div>
    </main>

    <div id="siteFooter"></div>
    <script type="module" src="/src/shop/shop.js"></script>
  </body>
</html>
